<script>

/* ==========================================
CONFIG
========================================== */

const EDGE_URL =
"https://YOUR_PROJECT.supabase.co/functions/v1/af-chat";

let CURRENT_USER = null;
let CURRENT_CHAT = null;
let CHAT_LIST = [];
let MESSAGE_LIST = [];

/* ==========================================
ELEMENTS
========================================== */

const loginScreen =
document.getElementById(
"afLoginScreen"
);

const homeScreen =
document.getElementById(
"afHomeScreen"
);

const roomScreen =
document.getElementById(
"afRoomScreen"
);

const loginBtn =
document.getElementById(
"chatLoginBtn"
);

const usernameInput =
document.getElementById(
"chatUsername"
);

const passwordInput =
document.getElementById(
"chatPassword"
);

const chatListEl =
document.getElementById(
"afChatList"
);

const searchInput =
document.getElementById(
"afChatSearch"
);

/* ==========================================
API
========================================== */

async function api(
action,
payload = {}
){

const response =
await fetch(
EDGE_URL,
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
action,
...payload
})
}
);

const result =
await response.json();

if(
!response.ok ||
!result.ok
){
throw new Error(
result.message ||
"Request Failed"
);
}

return result;

}

/* ==========================================
SESSION
========================================== */

function saveChatSession(
user
){

localStorage.setItem(
"af_chat_user_id",
user.id
);

localStorage.setItem(
"af_chat_username",
user.username
);

localStorage.setItem(
"af_chat_avatar",
user.avatar_url || ""
);

}

function clearChatSession(){

localStorage.removeItem(
"af_chat_user_id"
);

localStorage.removeItem(
"af_chat_username"
);

localStorage.removeItem(
"af_chat_avatar"
);

}

function getChatUserId(){

return localStorage.getItem(
"af_chat_user_id"
);

}

/* ==========================================
LOGIN
========================================== */

async function login(){

const username =
usernameInput.value.trim();

const password =
passwordInput.value.trim();

if(
!username ||
!password
){
alert(
"Enter credentials"
);
return;
}

loginBtn.disabled = true;
loginBtn.innerText =
"Loading...";

try{

const result =
await api(
"login",
{
username,
password
}
);

CURRENT_USER =
result.user;

saveChatSession(
CURRENT_USER
);

await loadProfile();

await loadChats();

showHome();

}catch(error){

alert(
error.message
);

}finally{

loginBtn.disabled =
false;

loginBtn.innerText =
"Login";

}

}

loginBtn.addEventListener(
"click",
login
);

/* ==========================================
LOAD PROFILE
========================================== */

async function loadProfile(){

const userId =
getChatUserId();

if(!userId){
return;
}

const result =
await api(
"profile",
{
user_id:userId
}
);

CURRENT_USER =
result.profile;

}

/* ==========================================
AUTO LOGIN
========================================== */

async function restoreSession(){

const userId =
getChatUserId();

if(!userId){
showLogin();
return;
}

try{

await loadProfile();

await loadChats();

showHome();

}catch{

clearChatSession();

showLogin();

}

}

/* ==========================================
SCREENS
========================================== */

function showLogin(){

loginScreen.style.display =
"flex";

homeScreen.style.display =
"none";

roomScreen.style.display =
"none";

}

function showHome(){

loginScreen.style.display =
"none";

homeScreen.style.display =
"flex";

roomScreen.style.display =
"none";

}

function showRoom(){

loginScreen.style.display =
"none";

homeScreen.style.display =
"none";

roomScreen.style.display =
"flex";

}

/* ==========================================
PRESENCE
========================================== */

async function updatePresence(){

if(
!CURRENT_USER
){
return;
}

try{

await api(
"presence",
{
user_id:
CURRENT_USER.id,
is_online:true
}
);

}catch{}

}

setInterval(
updatePresence,
30000
);

/* ==========================================
INIT
========================================== */

restoreSession();
  /* ==========================================
CHAT LIST
========================================== */

async function loadChats(){

if(!CURRENT_USER){
return;
}

try{

const result =
await api(
"chat_list",
{
user_id:
CURRENT_USER.id
}
);

CHAT_LIST =
result.chats || [];

renderChats();

}catch(error){

console.error(error);

}

}

function renderChats(){

chatListEl.innerHTML =
"";

if(
CHAT_LIST.length === 0
){

chatListEl.innerHTML =
`
<div style="
padding:30px;
text-align:center;
color:#8fa0b8;
">
No Chats Found
</div>
`;

return;

}

CHAT_LIST.forEach(
(chatItem)=>{

const chat =
chatItem.af_chats;

const row =
document.createElement(
"div"
);

row.className =
"af-chat-item";

row.innerHTML =
`
<div class="af-avatar">
${(
chat.title ||
"C"
)
.charAt(0)
.toUpperCase()}
</div>

<div class="af-chat-content">

<div class="af-chat-name">
${chat.title || "Chat"}
</div>

<div class="af-chat-last">
Tap To Open
</div>

</div>

<div class="af-online"></div>
`;

row.onclick =
()=>{

openChat(
chat.id,
chat.title
);

};

chatListEl.appendChild(
row
);

}
);

}

/* ==========================================
SEARCH USER
========================================== */

let searchTimer;

searchInput.addEventListener(
"input",
()=>{

clearTimeout(
searchTimer
);

searchTimer =
setTimeout(
searchUsers,
400
);

}
);

async function searchUsers(){

const query =
searchInput.value.trim();

if(
query.length < 2
){

await loadChats();

return;

}

try{

const result =
await api(
"search_user",
{
query
}
);

renderSearchResults(
result.users || []
);

}catch(error){

console.error(error);

}

}

function renderSearchResults(
users
){

chatListEl.innerHTML =
"";

if(
users.length === 0
){

chatListEl.innerHTML =
`
<div style="
padding:25px;
text-align:center;
color:#9aa7bd;
">
No Users Found
</div>
`;

return;

}

users.forEach(
(user)=>{

if(
CURRENT_USER &&
user.id ===
CURRENT_USER.id
){
return;
}

const row =
document.createElement(
"div"
);

row.className =
"af-chat-item";

row.innerHTML =
`
<div class="af-avatar">
${user.username
.charAt(0)
.toUpperCase()}
</div>

<div class="af-chat-content">

<div class="af-chat-name">
${user.username}
</div>

<div class="af-chat-last">
${
user.is_online
? "Online"
: "Offline"
}
</div>

</div>

</div>
`;

row.onclick =
()=>{

createPrivateChat(
user
);

};

chatListEl.appendChild(
row
);

}
);

}

/* ==========================================
ADD CONTACT
========================================== */

async function addContact(
contactId
){

try{

await api(
"add_contact",
{
owner_id:
CURRENT_USER.id,

contact_id:
contactId
}
);

}catch(error){

console.error(error);

}

}

/* ==========================================
PRIVATE CHAT
========================================== */

async function createPrivateChat(
user
){

try{

await addContact(
user.id
);

const result =
await api(
"create_private",
{
user1:
CURRENT_USER.id,

user2:
user.id
}
);

CURRENT_CHAT = {

id:
result.chat.id,

title:
user.username,

user_id:
user.id

};

openChat(
result.chat.id,
user.username
);

}catch(error){

console.error(error);

alert(
error.message
);

}

}

/* ==========================================
GROUP CHAT
========================================== */

async function createGroupChat(
groupName,
members
){

try{

const result =
await api(
"create_group",
{
title:
groupName,

creator_id:
CURRENT_USER.id,

members
}
);

await loadChats();

openChat(
result.chat.id,
groupName
);

}catch(error){

console.error(error);

}

}

/* ==========================================
CREATE GROUP UI
========================================== */

document
.getElementById(
"createChatBtn"
)
.addEventListener(
"click",
async()=>{

const type =
prompt(
"1 = User Chat\n2 = Group"
);

if(type === "2"){

const title =
prompt(
"Group Name"
);

if(!title){
return;
}

const ids =
prompt(
"Member IDs (comma separated)"
);

if(!ids){
return;
}

const members =
ids
.split(",")
.map(
v=>v.trim()
)
.filter(Boolean);

await createGroupChat(
title,
members
);

}

}
);

/* ==========================================
OPEN CHAT
========================================== */

function openChat(
chatId,
title
){

CURRENT_CHAT = {

id:chatId,
title:title

};

document
.getElementById(
"afRoomName"
)
.innerText =
title;

showRoom();

loadMessages();

}

/* ==========================================
BACK
========================================== */

document
.getElementById(
"afBackBtn"
)
.addEventListener(
"click",
()=>{

showHome();

loadChats();

}
);
  /* ==========================================
MESSAGES
========================================== */

async function loadMessages(){

if(
!CURRENT_CHAT
){
return;
}

try{

const result =
await api(
"messages",
{
chat_id:
CURRENT_CHAT.id,
limit:100
}
);

MESSAGE_LIST =
result.messages || [];

renderMessages();

markMessagesRead();

}catch(error){

console.error(error);

}

}

function renderMessages(){

const container =
document.getElementById(
"afMessages"
);

container.innerHTML =
"";

MESSAGE_LIST.forEach(
(message)=>{

const item =
document.createElement(
"div"
);

item.className =
`
af-message
${
message.sender_id ===
CURRENT_USER.id
? "me"
: "other"
}
`;

let receipt =
"";

if(
message.sender_id ===
CURRENT_USER.id
){

receipt =
`
<div style="
font-size:11px;
margin-top:4px;
opacity:.7;
text-align:right;
">
✓✓
</div>
`;

}

item.innerHTML =
`
<div>
${escapeHtml(
message.content || ""
)}
</div>
${receipt}
`;

container.appendChild(
item
);

}
);

container.scrollTop =
container.scrollHeight;

}

/* ==========================================
SEND MESSAGE
========================================== */

const sendBtn =
document.getElementById(
"afSendBtn"
);

const messageInput =
document.getElementById(
"afMessageInput"
);

sendBtn.addEventListener(
"click",
sendMessage
);

messageInput.addEventListener(
"keydown",
(event)=>{

if(
event.key === "Enter"
){

event.preventDefault();

sendMessage();

}

}
);

async function sendMessage(){

const content =
messageInput.value.trim();

if(
!content ||
!CURRENT_CHAT
){
return;
}

try{

messageInput.value =
"";

await api(
"send_message",
{
chat_id:
CURRENT_CHAT.id,

sender_id:
CURRENT_USER.id,

content,

message_type:
"text"
}
);

stopTyping();

await loadMessages();

}catch(error){

console.error(error);

}

}

/* ==========================================
READ RECEIPTS
========================================== */

async function markMessagesRead(){

for(
const message
of MESSAGE_LIST
){

if(
message.sender_id ===
CURRENT_USER.id
){
continue;
}

try{

await api(
"read_receipt",
{
message_id:
message.id,

user_id:
CURRENT_USER.id
}
);

}catch{}

}

}

/* ==========================================
TYPING
========================================== */

let typingTimeout;

messageInput.addEventListener(
"input",
()=>{

sendTyping();

clearTimeout(
typingTimeout
);

typingTimeout =
setTimeout(
stopTyping,
1500
);

}
);

async function sendTyping(){

if(
!CURRENT_CHAT
){
return;
}

try{

await api(
"typing",
{
chat_id:
CURRENT_CHAT.id,

user_id:
CURRENT_USER.id,

is_typing:true
}
);

}catch{}

}

async function stopTyping(){

if(
!CURRENT_CHAT
){
return;
}

try{

await api(
"typing",
{
chat_id:
CURRENT_CHAT.id,

user_id:
CURRENT_USER.id,

is_typing:false
}
);

}catch{}

}

/* ==========================================
ONLINE STATUS
========================================== */

async function refreshPresence(){

if(
!CURRENT_CHAT
){
return;
}

try{

await api(
"presence",
{
user_id:
CURRENT_USER.id,

is_online:true
}
);

}catch{}

}

setInterval(
refreshPresence,
30000
);

/* ==========================================
REALTIME MESSAGES
========================================== */

let realtimeTimer =
null;

function startRealtime(){

if(
realtimeTimer
){
clearInterval(
realtimeTimer
);
}

realtimeTimer =
setInterval(
async()=>{

if(
!CURRENT_CHAT
){
return;
}

await loadMessages();

},
2500
);

}

function stopRealtime(){

if(
realtimeTimer
){

clearInterval(
realtimeTimer
);

realtimeTimer =
null;

}

}

/* ==========================================
ROOM EVENTS
========================================== */

const originalOpenChat =
openChat;

openChat =
async function(
chatId,
title
){

CURRENT_CHAT = {
id:chatId,
title:title
};

document
.getElementById(
"afRoomName"
)
.innerText =
title;

showRoom();

await loadMessages();

startRealtime();

};

/* ==========================================
BACK BUTTON OVERRIDE
========================================== */

document
.getElementById(
"afBackBtn"
)
addEventListener(
"click",
()=>{

stopRealtime();

showHome();

}
);

/* ==========================================
LAST SEEN
========================================== */

function formatLastSeen(
timestamp
){

if(
!timestamp
){
return "Offline";
}

const diff =
Math.floor(
(
Date.now() -
new Date(
timestamp
).getTime()
)
/1000
);

if(
diff < 60
){
return "Last seen now";
}

if(
diff < 3600
){
return `Last seen ${Math.floor(diff/60)}m ago`;
}

if(
diff < 86400
){
return `Last seen ${Math.floor(diff/3600)}h ago`;
}

return `Last seen ${Math.floor(diff/86400)}d ago`;

}

/* ==========================================
ESCAPE HTML
========================================== */

function escapeHtml(
text
){

const div =
document.createElement(
"div"
);

div.textContent =
text;

return div.innerHTML;

}

/* ==========================================

========================================== */

const SUPABASE_URL =

const SUPABASE_ANON_KEY =
"YOUR_ANON_KEY";

const STORAGE_BUCKET =
"af-chat-media";

/* ==========================================
UPLOAD FILE
========================================== */

"change",
async(event)=>{

const file =

async function uploadMedia(
file
){

if(
!CURRENT_CHAT
){
return;
}

const extension =
file.name
.split(".")
.pop();

const fileName =
`
${crypto.randomUUID()}
.${extension}
`;

const uploadUrl =
`
${SUPABASE_URL}
/storage/v1/object/
${STORAGE_BUCKET}/
${fileName}
`;

const response =
await fetch(
uploadUrl,
{
method:"POST",
headers:{
apikey:
SUPABASE_ANON_KEY,

Authorization:
`Bearer ${SUPABASE_ANON_KEY}`,

"Content-Type":
file.type
},
body:file
}
);

if(
!response.ok
){

throw new Error(
"Upload Failed"
);

}

const publicUrl =
`
${SUPABASE_URL}
/storage/v1/object/authenticated/
${STORAGE_BUCKET}/
${fileName}
`;

await saveMediaRecord(
file,
publicUrl
);

await api(
"send_message",
{
chat_id:
CURRENT_CHAT.id,

sender_id:
CURRENT_USER.id,

content:
publicUrl,

message_type:
detectMessageType(
file
)
}
);

await loadMessages();

}

){

await fetch(

{

headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({

action:
"save_media",

sender_id:
CURRENT_USER.id,

chat_id:
CURRENT_CHAT.id,

file_name:
file.name,

file_url:
fileUrl,

file_size:
file.size,

mime_type:
file.type

})
}
);

}

  /* ==========================================
PINNED CHATS
========================================== */

let PINNED_CHATS = [];

async function pinChat(
chatId
){

try{

await api(
"pin_chat",
{
user_id:
CURRENT_USER.id,

chat_id:
chatId
}
);

if(
!PINNED_CHATS.includes(
chatId
)
){
PINNED_CHATS.push(
chatId
);
}

sortChats();

}catch(error){

console.error(
error
);

}

}

function sortChats(){

CHAT_LIST.sort(
(a,b)=>{

const aPinned =
PINNED_CHATS.includes(
a.chat_id
);

const bPinned =
PINNED_CHATS.includes(
b.chat_id
);

if(
aPinned &&
!bPinned
){
return -1;
}

if(
!aPinned &&
bPinned
){
return 1;
}

return 0;

}
);

renderChats();

}

);

},

);

}
);

element.addEventListener(
"touchend",
()=>{

clearTimeout(
longPressTimer
);

}
);

"mousedown",
()=>{

longPressTimer =
setTimeout(
()=>{

showMessageMenu(
message
);

},
600
);

}
);

"mouseup",
()=>{

clearTimeout(
longPressTimer
);

}
);

}

}
