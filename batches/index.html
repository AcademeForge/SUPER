<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timezy - Task Management</title>

<style>
:root{
    --primary:#0d5c2b;
    --primary-light:#eaf4ec;
    --bg:#f7f8f5;
    --card:#ffffff;
    --text:#1a1a1a;
    --muted:#777;
    --danger:#ff4d4f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

.hidden{
    display:none!important;
}

button{
    cursor:pointer;
    border:none;
}

input,textarea,select{
    width:100%;
    border:none;
    outline:none;
    background:#fff;
    padding:14px;
    border-radius:12px;
}

#onboarding{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.onboard-card{
    width:100%;
    max-width:450px;
    text-align:center;
}

.logo{
    font-size:48px;
    font-weight:800;
    margin-bottom:20px;
}

.illustration{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:50%;
    background:var(--primary-light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:90px;
}

.onboard-card h1{
    margin-top:20px;
    font-size:32px;
}

.onboard-card p{
    margin-top:10px;
    color:var(--muted);
}

.onboard-card input{
    margin-top:20px;
}

.primary-btn{
    width:100%;
    background:var(--primary);
    color:#fff;
    padding:14px;
    border-radius:14px;
    margin-top:15px;
    font-weight:600;
}

.app{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.header{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.greeting{
    color:#666;
    font-size:14px;
}

.username{
    font-size:28px;
    font-weight:700;
}

.edit-btn{
    background:#eee;
    padding:10px 15px;
    border-radius:12px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.stat{
    background:white;
    padding:20px;
    border-radius:18px;
}

.stat h3{
    color:#666;
    font-size:14px;
}

.stat .num{
    font-size:32px;
    font-weight:700;
    margin-top:8px;
}

.progress-card{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
}

.progress-bar{
    width:100%;
    height:12px;
    background:#e5e5e5;
    border-radius:30px;
    overflow:hidden;
    margin-top:10px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:var(--primary);
}

.form{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    gap:10px;
}

.task-toolbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.task-toolbar input{
    flex:1;
}

.filter-btn{
    padding:12px 18px;
    background:white;
    border-radius:12px;
}

.active-filter{
    background:var(--primary);
    color:white;
}

.task-list{
    display:grid;
    gap:12px;
}

.task{
    background:white;
    border-radius:18px;
    padding:16px;
}

.task-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.task-title{
    font-size:18px;
    font-weight:700;
}

.completed .task-title{
    text-decoration:line-through;
    opacity:.6;
}

.task-desc{
    color:#666;
    margin-top:6px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 10px;
    border-radius:30px;
    font-size:12px;
}

.high{
    background:#ffe2e2;
    color:#c62828;
}

.medium{
    background:#fff1d6;
    color:#b26a00;
}

.low{
    background:#e5f7ea;
    color:#157a35;
}

.task-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
}

.small-btn{
    padding:8px 12px;
    border-radius:10px;
}

.complete{
    background:#dff5e6;
}

.edit{
    background:#ececec;
}

.delete{
    background:#ffe3e3;
    color:#c00;
}

.empty{
    text-align:center;
    color:#666;
    padding:40px;
}

@media(max-width:600px){
    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .task-toolbar{
        flex-wrap:wrap;
    }
}
</style>
</head>
<body>

<!-- ONBOARDING -->

<div id="onboarding">
    <div class="onboard-card">
        <div class="logo">Timezy</div>

        <div class="illustration">👩🏻‍💻</div>

        <h1>Task Management</h1>

        <p>
            Manage tasks, set priorities,
            track progress and stay organized.
        </p>

        <input
            id="nameInput"
            placeholder="Enter your name"
        >

        <button class="primary-btn" id="startBtn">
            Let's Go
        </button>
    </div>
</div>

<!-- APP -->

<div id="app" class="app hidden">

    <div class="header">
        <div>
            <div class="greeting" id="greeting"></div>
            <div class="username" id="username"></div>
        </div>

        <button class="edit-btn" id="editName">
            ✏ Edit Name
        </button>
    </div>

    <div class="stats">
        <div class="stat">
            <h3>Total Tasks</h3>
            <div class="num" id="totalCount">0</div>
        </div>

        <div class="stat">
            <h3>Completed</h3>
            <div class="num" id="completedCount">0</div>
        </div>

        <div class="stat">
            <h3>Pending</h3>
            <div class="num" id="pendingCount">0</div>
        </div>
    </div>

    <div class="progress-card">
        <strong>Progress</strong>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="form">
        <div class="form-grid">
            <input id="taskTitle" placeholder="Task title">

            <textarea
                id="taskDesc"
                rows="3"
                placeholder="Task description"
            ></textarea>

            <select id="taskPriority">
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
            </select>

            <button class="primary-btn" id="addTask">
                Add Task
            </button>
        </div>
    </div>

    <div class="task-toolbar">
        <input id="search" placeholder="Search task...">

        <button class="filter-btn active-filter" data-filter="all">
            All
        </button>

        <button class="filter-btn" data-filter="active">
            Active
        </button>

        <button class="filter-btn" data-filter="completed">
            Completed
        </button>
    </div>

    <div id="taskList" class="task-list"></div>

</div>

<script>

const onboarding = document.getElementById("onboarding");
const app = document.getElementById("app");

let tasks = JSON.parse(localStorage.getItem("timezy_tasks")) || [];
let currentFilter = "all";

function saveTasks(){
    localStorage.setItem(
        "timezy_tasks",
        JSON.stringify(tasks)
    );
}

function getGreeting(){

    const h = new Date().getHours();

    if(h < 12) return "☀️ Good Morning";
    if(h < 17) return "🌤 Good Afternoon";
    if(h < 21) return "🌙 Good Evening";

    return "🌌 Good Night";
}

function updateHeader(){
    document.getElementById("greeting").textContent =
        getGreeting();

    document.getElementById("username").textContent =
        localStorage.getItem("timezy_user") || "User";
}

function updateStats(){

    const total = tasks.length;
    const completed = tasks.filter(t=>t.completed).length;
    const pending = total - completed;

    document.getElementById("totalCount").textContent = total;
    document.getElementById("completedCount").textContent = completed;
    document.getElementById("pendingCount").textContent = pending;

    const progress =
        total === 0
        ? 0
        : Math.round((completed/total)*100);

    document.getElementById("progressFill").style.width =
        progress + "%";
}

function renderTasks(){

    const list =
        document.getElementById("taskList");

    const search =
        document.getElementById("search")
        .value
        .toLowerCase();

    let filtered = tasks.filter(task=>{

        const matchSearch =
            task.title.toLowerCase().includes(search) ||
            task.description.toLowerCase().includes(search);

        if(!matchSearch) return false;

        if(currentFilter==="active")
            return !task.completed;

        if(currentFilter==="completed")
            return task.completed;

        return true;
    });

    if(filtered.length===0){
        list.innerHTML =
        `<div class="empty">
            No tasks found
        </div>`;
        return;
    }

    list.innerHTML = filtered.map(task=>`
        <div class="task ${task.completed ? 'completed':''}">
            <div class="task-top">

                <div>
                    <div class="task-title">
                        ${task.title}
                    </div>

                    <div class="task-desc">
                        ${task.description}
                    </div>

                    <div class="badge ${task.priority}">
                        ${task.priority.toUpperCase()}
                    </div>
                </div>

            </div>

            <div class="task-actions">

                <button
                    class="small-btn complete"
                    onclick="toggleTask(${task.id})"
                >
                    ${task.completed ? 'Undo' : 'Complete'}
                </button>

                <button
                    class="small-btn edit"
                    onclick="editTask(${task.id})"
                >
                    Edit
                </button>

                <button
                    class="small-btn delete"
                    onclick="deleteTask(${task.id})"
                >
                    Delete
                </button>

            </div>
        </div>
    `).join("");

    updateStats();
}

function toggleTask(id){

    tasks = tasks.map(task=>{
        if(task.id===id){
            task.completed = !task.completed;
        }
        return task;
    });

    saveTasks();
    renderTasks();
}

function deleteTask(id){

    if(!confirm("Delete task?")) return;

    tasks = tasks.filter(task=>task.id!==id);

    saveTasks();
    renderTasks();
}

function editTask(id){

    const task =
        tasks.find(t=>t.id===id);

    const title =
        prompt("Task title", task.title);

    if(title===null) return;

    const description =
        prompt(
            "Description",
            task.description
        );

    if(description===null) return;

    task.title = title;
    task.description = description;

    saveTasks();
    renderTasks();
}

document
.getElementById("addTask")
.onclick = ()=>{

    const title =
        document.getElementById("taskTitle")
        .value.trim();

    const desc =
        document.getElementById("taskDesc")
        .value.trim();

    const priority =
        document.getElementById("taskPriority")
        .value;

    if(!title){
        alert("Enter task title");
        return;
    }

    tasks.unshift({
        id:Date.now(),
        title,
        description:desc,
        priority,
        completed:false,
        createdAt:new Date().toISOString()
    });

    saveTasks();

    document.getElementById("taskTitle").value="";
    document.getElementById("taskDesc").value="";

    renderTasks();
};

document
.getElementById("search")
.addEventListener(
    "input",
    renderTasks
);

document
.querySelectorAll("[data-filter]")
.forEach(btn=>{

    btn.onclick = ()=>{

        document
        .querySelectorAll("[data-filter]")
        .forEach(b=>
            b.classList.remove("active-filter")
        );

        btn.classList.add("active-filter");

        currentFilter =
            btn.dataset.filter;

        renderTasks();
    };
});

document
.getElementById("editName")
.onclick = ()=>{

    const name =
        prompt(
            "Enter your name",
            localStorage.getItem("timezy_user")
        );

    if(!name) return;

    localStorage.setItem(
        "timezy_user",
        name
    );

    updateHeader();
};

document
.getElementById("startBtn")
.onclick = ()=>{

    const name =
        document
        .getElementById("nameInput")
        .value
        .trim();

    if(!name){
        alert("Enter your name");
        return;
    }

    localStorage.setItem(
        "timezy_user",
        name
    );

    localStorage.setItem(
        "timezy_onboarding",
        "true"
    );

    showApp();
};

function showApp(){

    onboarding.classList.add("hidden");
    app.classList.remove("hidden");

    updateHeader();
    renderTasks();
}

if(
    localStorage.getItem("timezy_onboarding")
){
    showApp();
}

</script>

</body>
</html>
