      learn: [

  function afBatchEl(id) {
    return document.getElementById(id);
  }

  function getCurrentStudentaf() {
    return {
      id: localStorage.getItem("af_student_uuid") || "",
      student_id: localStorage.getItem("af_student_id") || "",
      mobile: localStorage.getItem("af_student_mobile") || "",
      name: localStorage.getItem("af_student_name") || "Student",
      email: localStorage.getItem("af_student_email") || ""
    };
  }

  function isBatchEnrolledaf(courseSlug) {
    return afEnrolledCourseSlugs.includes(courseSlug);
  }

  async function checkBatchCourseExistsaf(batch) {
    if (!batch || !batch.courseId) {
      throw new Error("Course ID missing for this batch.");
    }

    const { data, error } = await db
      .from("courses")
      .select("id,title")
      .eq("id", batch.courseId)
      .limit(1);

    if (error) {
      console.log("Course check error:", error);
      throw new Error("Could not verify course. " + error.message);
    }

    if (!data || data.length === 0) {
      throw new Error("This course ID was not found in Supabase courses table.");
    }

    return true;
  }

  async function loadEnrolledBatchSlugsaf() {
    const student = getCurrentStudentaf();

    afEnrolledCourseSlugs = [];

    if (!student.id) {
      return [];
    }

    try {
      const { data, error } = await db
        .from("student_courses")
        .select("course_id, status")
        .eq("student_id", student.id)
        .eq("status", "active");

      if (error) {
        console.error("Enrolled check error:", error);
        return [];
      }

      const enrolledCourseIds = (data || []).map(function(row) {
        return row.course_id;
      });

      afEnrolledCourseSlugs = afBatches
        .filter(function(batch) {
          return enrolledCourseIds.includes(batch.courseId);
        })
        .map(function(batch) {
          return batch.courseSlug;
        });

      return afEnrolledCourseSlugs;

    } catch (err) {
      console.error("loadEnrolledBatchSlugsaf error:", err);
      return [];
    }
  }

  async function openBatchSectionaf() {
    showBatchListaf();
    await loadEnrolledBatchSlugsaf();
    renderBatchesaf(afBatches);
  }

  function showBatchListaf() {
    const list = afBatchEl("batchListBoxaf");
    const details = afBatchEl("batchDetailsBoxaf");

    if (details) {
      details.classList.add("hidden-box");
      details.style.display = "none";
    }

    if (list) {
      list.classList.remove("hidden-box");
      list.style.display = "block";
    }
  }

  function backToBatchListaf() {
    showBatchListaf();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderBatchesaf(list) {
    const box = afBatchEl("batchCardsaf");
    const count = afBatchEl("batchCountTextaf");

    if (!box) return;

    if (count) {
      count.textContent = list.length + " batches available";
    }

    if (!list.length) {
      box.innerHTML = '<p class="empty-textaf">No batch found.</p>';
      return;
    }

    box.innerHTML = list.map(function(batch) {
      const enrolled = isBatchEnrolledaf(batch.courseSlug);

      return `
        <div class="batch-cardaf ${enrolled ? "batch-enrolled-cardaf" : ""}">
          <div class="batch-img-wrapaf" onclick="openBatchDetailsaf('${batch.id}')">
            <span class="batch-loaderaf"></span>
            <img
              class="batch-imgaf"
              src="${batch.image}"
              alt="${batch.title}"
              loading="lazy"
              onload="this.previousElementSibling.style.display='none'"
              onerror="this.previousElementSibling.style.display='none'"
            >
          </div>

          <div class="batch-card-bodyaf">
            <div class="batch-card-metaaf">
              <p class="batch-categoryaf">${batch.category}</p>
              <span class="batch-languageaf">${batch.language}</span>
            </div>

            <h3 class="batch-titleaf" onclick="openBatchDetailsaf('${batch.id}')">
              ${batch.title}
            </h3>

            <p class="batch-subaf">${batch.subtitle}</p>

            <div class="batch-statusaf">
              <span class="batch-dotaf ${enrolled ? "batch-dot-enrolledaf" : ""}"></span>
              <span>${enrolled ? "Enrolled" : batch.status}</span>
              <span>|</span>
              <span>${enrolled ? "Access active" : batch.startText}</span>
            </div>

            ${enrolled ? `<div class="batch-enrolled-tagaf">✓ Already Enrolled</div>` : ""}

            <div class="batch-price-actionaf">
              <div class="batch-priceaf">
                <div class="batch-price-lineaf">
                  <strong>₹${batch.price}</strong>
                  <del>₹${batch.oldPrice}</del>
                </div>
                <span class="batch-offaf">${afBatchDiscount}% OFF</span>
              </div>

              <div class="batch-buy-rowaf">
                ${
                  enrolled
                    ? `<button class="batch-buy-btnaf batch-enrolled-btnaf" type="button" disabled>Already Enrolled</button>`
                    : `<button class="batch-buy-btnaf" type="button" onclick="buyBatchDirectaf('${batch.id}', this)">Buy Now</button>`
                }

                <button class="batch-arrowaf" type="button" onclick="openBatchDetailsaf('${batch.id}')">›</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function filterBatchesaf() {
    const input = afBatchEl("batchSearchInputaf");
    const query = input ? input.value.trim().toLowerCase() : "";

    if (!query) {
      renderBatchesaf(afBatches);
      return;
    }

    const filtered = afBatches.filter(function(batch) {
      return (
        batch.title.toLowerCase().includes(query) ||
        batch.subtitle.toLowerCase().includes(query) ||
        batch.courseSlug.toLowerCase().includes(query)
      );
    });

    renderBatchesaf(filtered);
  }

  function openBatchDetailsaf(batchId) {
    const batch = afBatches.find(function(item) {
      return item.id === batchId;
    });

    if (!batch) {
      alert("Batch not found.");
      return;
    }

    afSelectedBatch = batch;

    const list = afBatchEl("batchListBoxaf");
    const details = afBatchEl("batchDetailsBoxaf");

    if (list) {
      list.classList.add("hidden-box");
      list.style.display = "none";
    }

    if (details) {
      details.classList.remove("hidden-box");
      details.style.display = "block";
    }

    const enrolled = isBatchEnrolledaf(batch.courseSlug);

    afBatchEl("batchDetailImageaf").src = batch.image;
    afBatchEl("batchDetailCategoryaf").textContent = batch.category;
    afBatchEl("batchDetailLanguageaf").textContent = batch.language;
    afBatchEl("batchDetailTitleaf").textContent = batch.title;
    afBatchEl("batchDetailDescaf").textContent = batch.subtitle;
    afBatchEl("batchDetailPriceaf").textContent = "₹" + batch.price;
    afBatchEl("batchDetailOldPriceaf").textContent = "₹" + batch.oldPrice;
    afBatchEl("batchDetailOffaf").textContent = afBatchDiscount + "% OFF";
    afBatchEl("batchFullDetailsaf").textContent = batch.details;

    afBatchEl("batchLearnListaf").innerHTML = batch.learn.map(function(item) {
      return `<li>${item}</li>`;
    }).join("");

    afBatchEl("batchFacilityListaf").innerHTML = batch.facilities.map(function(item) {
      return `<li>${item}</li>`;
    }).join("");

    const btn = afBatchEl("batchDetailBuyBtnaf");

    if (btn) {
      if (enrolled) {
        btn.textContent = "Already Enrolled";
        btn.disabled = true;
        btn.classList.add("batch-enrolled-btnaf");
      } else {
        btn.textContent = "Buy Now";
        btn.disabled = false;
        btn.classList.remove("batch-enrolled-btnaf");
      }
    }

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function buyBatchDirectaf(batchId, btn) {
    const batch = afBatches.find(function(item) {
      return item.id === batchId;
    });

    if (!batch) {
      alert("Batch not found.");
      return;
    }

    if (isBatchEnrolledaf(batch.courseSlug)) {
      alert("You are already enrolled in this batch.");
      return;
    }

    afSelectedBatch = batch;
    startBatchPaymentaf(batch, btn);
  }

  function buySelectedBatchaf() {
    if (!afSelectedBatch) {
      alert("Please select a batch first.");
      return;
    }

    if (isBatchEnrolledaf(afSelectedBatch.courseSlug)) {
      alert("You are already enrolled in this batch.");
      return;
    }

    const btn = afBatchEl("batchDetailBuyBtnaf");
    startBatchPaymentaf(afSelectedBatch, btn);
  }

  async function startBatchPaymentaf(batch, btn) {
    const student = getCurrentStudentaf();

    if (!student.id) {
      alert("Please login in AcademeForge app first, then open Batches.");
      return;
    }

    if (!batch.courseId) {
      alert("Course ID missing for this batch.");
      return;
    }

    if (typeof Razorpay === "undefined") {
      alert("Razorpay checkout script not loaded.");
      return;
    }

    if (!RAZORPAY_KEY_ID || RAZORPAY_KEY_ID === "YOUR_RAZORPAY_KEY_ID") {
      alert("Razorpay Key ID is not added yet.");
      return;
    }

    if (btn) {
      btn.disabled = true;
      btn.textContent = "Checking...";
    }

    try {
      await checkBatchCourseExistsaf(batch);

      if (btn) {
        btn.textContent = "Opening Payment...";
      }

      const options = {
        key: RAZORPAY_KEY_ID,
        amount: Number(batch.price) * 100,
        currency: "INR",
        name: "AcademeForge",
        description: batch.title,
        image: "",
        prefill: {
          name: student.name,
          email: student.email,
          contact: student.mobile
        },
        notes: {
          student_uuid: student.id,
          student_id: student.student_id,
          course_id: batch.courseId,
          course_slug: batch.courseSlug,
          batch_title: batch.title
        },
        method: {
          upi: true,
          card: true,
          netbanking: true,
          wallet: true,
          paylater: false,
          emi: false
        },
        theme: {
          color: "#16a34a"
        },
        handler: async function(response) {
          try {
            if (btn) {
              btn.textContent = "Adding Access...";
            }

            await grantBatchAccessaf(batch, response);

            await loadEnrolledBatchSlugsaf();

            alert("Payment successful! Batch access added.");

            renderBatchesaf(afBatches);
            backToBatchListaf();

          } catch (err) {
            console.log("After payment error:", err);
            alert(err.message || "Payment done, but access update failed.");

            if (btn) {
              btn.disabled = false;
              btn.textContent = "Buy Now";
            }
          }
        },
        modal: {
          ondismiss: function() {
            if (btn) {
              btn.disabled = false;
              btn.textContent = "Buy Now";
            }

            alert("Payment cancelled.");
          }
        }
      };

      const rzp = new Razorpay(options);

      rzp.on("payment.failed", function(response) {
        console.error("Razorpay failed:", response);

        let message = "Payment failed. Please try again.";

        if (response && response.error && response.error.description) {
          message = response.error.description;
        }

        alert(message);

        if (btn) {
          btn.disabled = false;
          btn.textContent = "Buy Now";
        }
      });

      rzp.open();

    } catch (err) {
      console.log("Start batch payment error:", err);
      alert(err.message || "Something went wrong.");

      if (btn) {
        btn.disabled = false;
        btn.textContent = "Buy Now";
      }
    }
  }

  async function grantBatchAccessaf(batch, paymentResponse) {
    const student = getCurrentStudentaf();

    if (!student.id) {
      throw new Error("Student login session not found.");
    }

    if (!batch.courseId) {
      throw new Error("Course ID missing.");
    }

    const { data: existingAccess, error: existingError } = await db
      .from("student_courses")
      .select("id, status")
      .eq("student_id", student.id)
      .eq("course_id", batch.courseId)
      .maybeSingle();

    if (existingError) {
      throw new Error("Access check failed: " + existingError.message);
    }

    if (existingAccess && existingAccess.id) {
      const { error: updateError } = await db
        .from("student_courses")
        .update({
          status: "active"
        })
        .eq("id", existingAccess.id);

      if (updateError) {
        throw new Error("Access update failed: " + updateError.message);
      }

      await saveBatchPaymentRecordaf(batch, paymentResponse);
      return true;
    }

    const { error: insertError } = await db
      .from("student_courses")
      .insert([{
        student_id: student.id,
        course_id: batch.courseId,
        status: "active"
      }]);

    if (insertError) {
      throw new Error("Access insert failed: " + insertError.message);
    }

    await saveBatchPaymentRecordaf(batch, paymentResponse);
    return true;
  }

  async function saveBatchPaymentRecordaf(batch, paymentResponse) {
    const student = getCurrentStudentaf();

    try {
      const { error } = await db
        .from("batch_payments_af")
        .insert([{
          student_uuid: student.id,
          student_id: student.student_id,
          student_name: student.name,
          mobile: student.mobile,
          email: student.email,
          course_id: batch.courseId,
          course_slug: batch.courseSlug,
          batch_id: batch.id,
          batch_title: batch.title,
          amount: batch.price,
          currency: "INR",
          razorpay_payment_id: paymentResponse.razorpay_payment_id || "",
          razorpay_order_id: paymentResponse.razorpay_order_id || "",
          razorpay_signature: paymentResponse.razorpay_signature || "",
          status: "paid"
        }]);

      if (error) {
        console.log("Payment record insert skipped:", error.message);
      }

    } catch (err) {
      console.log("Payment record skipped:", err.message);
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    openBatchSectionaf();
  });
</script>
